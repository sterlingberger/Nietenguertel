<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nietengürtel</title>
    <link rel="icon" href="data/favicon.png" type="image/png">
    <style>
        /* Dunkles Farbschema nach Vorgabe */
        body {
            font-family: sans-serif;
            padding: 2rem;
            background: #020309; /* Seiten-Hintergrund */
            color: #e6e6e6; /* allgemeiner Text */
            /* kein horizontales Scrolling am Body, nur die Tabelle scrollt */
            /*overflow-x: hidden;*/
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        /* Header-Bild Container (zentriert, responsive) */
        .header-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 36px;
        }

            .header-container img.header-img {
                display: block;
                width: min(60vw, 700px); /* skaliert mit Viewport */
                max-width: 85%;
                height: auto;
            }

        /* schmale rote Linie unter dem Bild, nicht full-width */
        .header-divider {
            height: 1px;
            background: #6B2626; /* rote Linie */
            width: min(80%, 1024px);
            margin: 8px auto 24px auto; /* zentriert mit Abstand oben/unten */
            border-radius: 1px;
            opacity: 1;
        }

        /* Filters bleiben zentriert oberhalb der scrollbaren Tabelle */
        .filters {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: center; /* zentriert die Filter */
        }

            /* Separator zwischen Icon-Filtern und Row-Filter-Buttons */
            .filters .sep {
                color: #444;
                padding: 0 6px;
                user-select: none;
                align-self: stretch;
                display: inline-flex;
                align-items: center;
            }

        .row-filters {
            display: inline-flex;
            gap: 0.5rem;
            align-items: center;
        }

        .row-btn {
            background: transparent;
            border: 1px solid #361313; /* inaktiv: #361313 */
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #e6e6e6;
        }

            .row-btn.active {
                border-color: #28a745; /* aktiv bleibt grün */
                background: #0f2a12; /* dezenter Grünton-Hintergrund bei aktiv */
                color: #ffffff;
            }

        /* Wrapper: Nur dieser Bereich scrollt horizontal */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: auto;
            max-height: 80vh;
            -webkit-overflow-scrolling: touch;
            scrollbar-gutter: stable;
        }

            /* Tabelle zentrieren innerhalb des Wrappers */
            .table-wrapper table {
                margin: 0 auto;
            }

        table {
            min-width: 600px;
            width: auto;
            border-collapse: collapse;
            background: #020309; /* Tabellen-Hintergrund wie Seiten-Hintergrund */
            table-layout: fixed;
        }

        th {
            position: sticky; /*damit Header mitgescrollt wird*/
            top: 0;
            z-index: 1;
            background: #6B2626; /* Header-Farbe */
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 14px;
            border: 1px solid #6B2626; /* Linienfarbe */
            text-align: left;
            color: #ffffff;
            /* erlauben Umbrüche auch in langen Venue-Namen (nur wenn nötig) */
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
            min-width: 220px;
        }

            th.date-col {
                width: 5%;
                white-space: normal;
                min-width: 60px;
            }

        td {
            padding: 10px 14px;
            border: 1px solid #6B2626; /* Tabellenlinien dunkelrot */
            vertical-align: top;
            font-size: 0.9rem;
            /* erlaubt Wortumbrüche auch innerhalb langer Wörter (hilft im Hochformat auf Handy) */
            overflow-wrap: anywhere;
            word-break: break-word;
            background: transparent; /* Zellen nehmen Tabellen-Hintergrund an */
            color: #e6e6e6;
        }

            td.date-cell {
                font-weight: 500;
                color: #d0d6d9; /* Datum etwas heller */
                /* erlaubt normalen Zeilenumbruch (nicht erzwungen) */
                white-space: normal;
            }

        .event-entry + .event-entry {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed rgba(107,38,38,0.15); /* dezente Trennung */
        }

        .band {
            font-weight: 700;
            /* lange Künstlernamen umbrechen, verhindern Überlaufen */
            overflow-wrap: anywhere;
            word-break: break-word;
            color: #ffffff; /* Artist: weiß */
        }

        .info {
            font-size: 0.82rem;
            color: #9aa3ad; /* Info: gedämpftes Grau (unterschiedlicher Ton) */
            margin-top: 2px;
        }

        tr:nth-child(even) td {
            background: rgba(255,255,255,0.01); /* sehr dezenter Wechsel */
        }

        /* Datumskomponenten inline belassen, damit Umbruch nur bei Bedarf passiert */
        .date-cell .weekday,
        .date-cell .datepart {
            display: inline;
            font-size: 0.95em;
        }

        /* Icon-Filter: sichtbar statt Checkbox */
        .filter-icon {
            width: 36px;
            height: 36px;
            cursor: pointer;
            border-radius: 6px;
            padding: 4px;
            box-sizing: border-box;
            border: 2px solid #361313; /* inaktiv: #361313 */
            transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
            background: transparent;
        }

            .filter-icon:hover {
                transform: translateY(-1px);
            }

            .filter-icon.active,
            .filter-icon[aria-pressed="true"] {
                border-color: #28a745; /* grün */
                box-shadow: 0 0 0 4px rgba(40,167,69,0.12);
            }

        /* Horizontale Scroll-Leiste (mobil) - sichtbar bei Bedarf per JS */
        .h-scroll {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 18px; /* Höhe der sichtbaren Leiste */
            overflow-x: auto;
            overflow-y: hidden;
            z-index: 9999;
            display: none; /* wird per JS sichtbar gemacht, wenn nötig */
            background: transparent;
        }

            .h-scroll .inner {
                height: 1px;
            }

        .legal-links {
            text-align: center;
            margin-top: 24px;
            color: #6B2626; /* gewünschte Schriftfarbe */
            font-size: 0.95rem;
        }

            .legal-links a {
                color: #6B2626;
                margin: 0 10px;
                text-decoration: none;
            }

                .legal-links a:hover {
                    text-decoration: underline;
                }

        .participate-link {
            text-align: center;
            color: #6B2626;
        }

            .participate-link a {
                color: #6B2626;
                margin: 0 10px;
                text-decoration: none;
            }

                .participate-link a:hover {
                    text-decoration: underline;
                }
    </style>
</head>
<body>
    <!-- Header-Bild (zentriert, responsive) -->
    <div class="header-container" aria-hidden="false">
        <img src="data/snake_header_red.png" alt="Snake Header" class="header-img" />
    </div>
    <div class="header-divider" aria-hidden="true"></div>

    <div class="filters" aria-hidden="false">
        <!-- versteckte Checkboxen bleiben als State-Quelle erhalten -->
        <input type="checkbox" id="filter-u3" checked hidden>
        <img src="data/u3.svg" alt="U3" class="filter-icon" data-target="filter-u3" role="button" aria-pressed="true" />

        <input type="checkbox" id="filter-u6" checked hidden>
        <img src="data/u6.svg" alt="U6" class="filter-icon" data-target="filter-u6" role="button" aria-pressed="true" />

        <span class="sep">|</span>

        <div class="row-filters" role="radiogroup" aria-label="Zeilenfilter">
            <button class="row-btn" data-filter="today" aria-checked="false" role="radio">heute</button>
            <button class="row-btn active" data-filter="week" aria-checked="true" role="radio">diese woche</button>
            <button class="row-btn" data-filter="all" aria-checked="false" role="radio">alle</button>
        </div>

        <span class="sep">|</span>
        <a class ="participate-link" href="mitmachen.html">mitmachen</a>
    </div>

    <div class="table-wrapper">
        <table id="event-table">
            <thead>
                <tr id="header-row">
                    <th class="date-col">Datum</th>
                    <!-- venue header cells werden zur Laufzeit erzeugt -->
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="5" style="color:#999; text-align:center;">Lade Daten...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="h-scroll" id="h-scroll" aria-hidden="true"><div class="inner" id="h-scroll-inner"></div></div>

    <div class="legal-links">
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
    </div>

    <script>
        // Falls der Server die Venue-Objekte injiziert, erwartet das hier ein Array von Objekten:
        // window.VENUE_OBJECTS = [{ Name: 'Arena', LocationFilter: ['U3'] }, ...]
        // Fallback: wenn nicht vorhanden, benutze die alte Liste ohne LocationFilter.
        const rawVenues = window.VENUE_OBJECTS ?? [
            { Name: 'Arena', LocationFilter: ['U3'] },
            { Name: 'Chelsea', LocationFilter: ['U6'] },
            { Name: 'Kramladen', LocationFilter: ['U6'] },
            { Name: 'Viper Room', LocationFilter: ['U3'] },
            { Name: 'Rhiz', LocationFilter: ['U6'] },
            { Name: 'B72', LocationFilter: ['U6'] },
            { Name: 'Venster99', LocationFilter: ['U6'] },
            { Name: 'Szene', LocationFilter: ['U3'] },
            { Name: 'Cafe Carina', LocationFilter: ['U6'] }
        ];

        // Normalisierte Venue-Liste (nur Namen + LocationFilter)
        const VENUE_OBJECTS = rawVenues.map(v => ({
            name: v.Name ?? v.name,
            locations: Array.isArray(v.LocationFilter) ? v.LocationFilter : (v.LocationFilter ? [v.LocationFilter] : (v.locations ?? []))
        }));

        const filterU3 = document.getElementById('filter-u3');
        const filterU6 = document.getElementById('filter-u6');
        const headerRow = document.getElementById('header-row');
        const tbody = document.getElementById('table-body');

        // Erzeuge Headerzellen dynamisch (Datum bleibt erste Spalte)
        function renderHeaders() {
            // entferne vorhandene venue-ths
            Array.from(headerRow.querySelectorAll('th.venue-col')).forEach(n => n.remove());

            VENUE_OBJECTS.forEach((v, idx) => {
                const th = document.createElement('th');
                th.className = 'venue-col';
                th.setAttribute('data-venue-index', idx);
                th.setAttribute('data-locations', v.locations.join(','));
                th.textContent = v.name;
                headerRow.appendChild(th);
            });
        }

        // Sichtbarkeit der Spalten aktualisieren basierend auf Checkboxen
        function updateColumnVisibility() {
            const showU3 = filterU3.checked;
            const showU6 = filterU6.checked;
            VENUE_OBJECTS.forEach((v, idx) => {
                const locations = v.locations || [];
                // Spalte zeigen, falls eine der Location-Typen erlaubt ist
                const shouldShow = (showU3 && locations.includes('U3')) || (showU6 && locations.includes('U6')) || (locations.length === 0 && (showU3 || showU6));
                // header
                const th = headerRow.querySelector(`th[data-venue-index="${idx}"]`);
                if (th) th.style.display = shouldShow ? '' : 'none';
                // zellen in allen rows
                tbody.querySelectorAll(`td[data-venue-index="${idx}"]`).forEach(td => {
                    td.style.display = shouldShow ? '' : 'none';
                });
            });
        }

        // ---------------- Row-Filter (heute / diese woche / alle) ----------------
        const rowButtons = Array.from(document.querySelectorAll('.row-btn'));
        let currentRowFilter = rowButtons.find(b => b.classList.contains('active'))?.dataset.filter ?? 'all';

        function parseISODate(iso) {
            // iso expected "YYYY-MM-DD"
            const parts = String(iso).split('-').map(Number);
            if (parts.length < 3) return new Date(NaN);
            return new Date(parts[0], parts[1] - 1, parts[2]);
        }
        function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

        function updateRowFilter() {
            const today = startOfDay(new Date());
            let start = null, end = null;

            if (currentRowFilter === 'today') {
                start = today;
                end = today;
            } else if (currentRowFilter === 'week') {
                // Woche: Montag bis Sonntag (DE-Konvention)
                const day = today.getDay(); // 0=So,1=Mo...
                const diffToMonday = (day + 6) % 7; // 0->6,1->0,...
                start = startOfDay(new Date(today.getFullYear(), today.getMonth(), today.getDate() - diffToMonday));
                end = startOfDay(new Date(start.getFullYear(), start.getMonth(), start.getDate() + 6));
            } else { // all
                start = null; end = null;
            }

            tbody.querySelectorAll('tr').forEach(tr => {
                const dateIso = tr.dataset.date; // wir setzen dies beim Rendern
                if (!dateIso) return; // header or placeholder rows
                if (currentRowFilter === 'all') {
                    tr.style.display = '';
                } else {
                    const d = parseISODate(dateIso);
                    const sd = startOfDay(d);
                    if (!isNaN(d)) {
                        const show = sd >= start && sd <= end;
                        tr.style.display = show ? '' : 'none';
                    } else {
                        tr.style.display = 'none';
                    }
                }
            });
        }

        // Radio-like Verhalten für die Buttons
        rowButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                rowButtons.forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-checked', 'false');
                });
                btn.classList.add('active');
                btn.setAttribute('aria-checked', 'true');
                currentRowFilter = btn.dataset.filter;
                updateRowFilter();
            });
        });
        // -----------------------------------------------------------------------

        // Daten aus events.json lesen und Tabelle rendern
        fetch('data/events.json')
            .then(r => r.json())
            .then(events => {
                // erstelle Header
                renderHeaders();

                // sortieren
                events.sort((a, b) => a.Date.localeCompare(b.Date));

                // gruppieren nach Datum
                const byDate = {};
                for (const e of events) {
                    if (!byDate[e.Date]) byDate[e.Date] = {};
                    if (!byDate[e.Date][e.Venue]) byDate[e.Date][e.Venue] = [];
                    byDate[e.Date][e.Venue].push(e);
                }

                tbody.innerHTML = '';

                for (const date of Object.keys(byDate).sort()) {
                    const tr = document.createElement('tr');
                    // speichere das ISO-Datum als data-Attribut für Filter
                    tr.dataset.date = date;

                    const d = new Date(date);
                    const weekday = d.toLocaleDateString('de-AT', { weekday: 'short' }).replace(/\.$/, '');
                    const datePart = d.toLocaleDateString('de-AT', {
                        day: '2-digit', month: '2-digit', year: '2-digit'
                    });

                    const tdDate = document.createElement('td');
                    tdDate.className = 'date-cell';
                    tdDate.innerHTML = `<span class="weekday">${weekday}</span> <span class="datepart">${datePart}</span>`;
                    tr.appendChild(tdDate);

                    // Erzeuge für jede Venue in der gleichen Reihenfolge eine Zelle (sichtbar/hidden später)
                    VENUE_OBJECTS.forEach((v, idx) => {
                        const td = document.createElement('td');
                        td.setAttribute('data-venue-index', idx);
                        const eventsForVenue = byDate[date][v.name] || [];
                        eventsForVenue.forEach((e) => {
                            const entry = document.createElement('div');
                            entry.className = 'event-entry';

                            const bandDiv = document.createElement('div');
                            bandDiv.className = 'band';
                            bandDiv.textContent = e.Artist || '';

                            if (e.Link) {
                                bandDiv.style.cursor = 'pointer';
                                bandDiv.title = 'Link öffnen';
                                bandDiv.addEventListener('click', () => {
                                    try {
                                        window.open(e.Link, '_blank', 'noopener,noreferrer');
                                    } catch (err) {
                                        console.error('Konnte Link nicht öffnen', err);
                                    }
                                });
                            }

                            const infoDiv = document.createElement('div');
                            infoDiv.className = 'info';
                            infoDiv.textContent = e.InfoShort || '';

                            entry.appendChild(bandDiv);
                            entry.appendChild(infoDiv);
                            td.appendChild(entry);
                        });
                        tr.appendChild(td);
                    });

                    tbody.appendChild(tr);
                }

                // initiale Sichtbarkeit anwenden
                updateColumnVisibility();
                updateRowFilter();
            })
            .catch(() => {
                document.getElementById('table-body').innerHTML =
                    '<tr><td colspan="5" style="color:red; text-align:center;">Fehler beim Laden der Daten.</td></tr>';
            });

        // event listeners für filter (Icon-Checkboxen)
        filterU3.addEventListener('change', updateColumnVisibility);
        filterU6.addEventListener('change', updateColumnVisibility);

        // Hilfsfunktion: Icon-Visual abhängig vom Checkbox-Status gesetzt
        function updateIconState(icon, checked) {
            if (checked) {
                icon.classList.add('active');
                icon.setAttribute('aria-pressed', 'true');
            } else {
                icon.classList.remove('active');
                icon.setAttribute('aria-pressed', 'false');
            }
        }

        // Icon-Interaktion initialisieren und mit Checkboxen synchronisieren
        document.querySelectorAll('.filter-icon').forEach(icon => {
            const cbId = icon.dataset.target;
            const cb = document.getElementById(cbId);
            if (!cb) return;

            // initialen Zustand setzen
            updateIconState(icon, cb.checked);

            // Klick auf Icon toggelt die Checkbox, aktualisiert UI und Sichtbarkeit
            icon.addEventListener('click', () => {
                cb.checked = !cb.checked;
                updateIconState(icon, cb.checked);
                // bestehende Logik wiederverwenden
                updateColumnVisibility();
                // feuere change, falls andere Listener darauf hören
                cb.dispatchEvent(new Event('change', { bubbles: true }));
            });

            // falls Checkbox anderweitig geändert wird, Icon mitziehen
            cb.addEventListener('change', () => updateIconState(icon, cb.checked));
        });

        // Sichtbarkeit der h-scroll Leiste steuern (mobil)
        const hScroll = document.querySelector('.h-scroll');
        const observer = new ResizeObserver(entries => {
            entries.forEach(entry => {
                const { offsetWidth, scrollWidth } = entry.target;
                // Zeige die h-scroll Leiste nur an, wenn der Inhalt breiter ist als der sichtbare Bereich
                if (scrollWidth > offsetWidth) {
                    hScroll.style.display = 'block';
                } else {
                    hScroll.style.display = 'none';
                }
            });
        });

        // Überwache die Tabelle auf Größenänderungen (für die h-scroll Leiste)
        observer.observe(document.querySelector('.table-wrapper'));

        (function () {
            const wrapper = document.querySelector('.table-wrapper');
            const table = document.getElementById('event-table');
            const hScroll = document.getElementById('h-scroll');
            const hInner = document.getElementById('h-scroll-inner');

            if (!wrapper || !table || !hScroll || !hInner) return;

            function updateHScroll() {
                // Inhalt breiter als sichtbarer Bereich?
                const needH = table.scrollWidth > wrapper.clientWidth + 1;
                if (needH) {
                    hInner.style.width = table.scrollWidth + 'px';
                    hScroll.style.display = 'block';
                } else {
                    hScroll.style.display = 'none';
                }
                // Beim (Re-)Berechnen: synchronisiere Position
                hScroll.scrollLeft = wrapper.scrollLeft;
            }

            // Zwei-Wege-Synchronisation der Scrollposition
            let raf = null;
            wrapper.addEventListener('scroll', () => {
                if (raf) cancelAnimationFrame(raf);
                raf = requestAnimationFrame(() => {
                    hScroll.scrollLeft = wrapper.scrollLeft;
                    raf = null;
                });
            });
            hScroll.addEventListener('scroll', () => {
                if (raf) cancelAnimationFrame(raf);
                raf = requestAnimationFrame(() => {
                    wrapper.scrollLeft = hScroll.scrollLeft;
                    raf = null;
                });
            });

            // Beobachter / Hooks für Größenänderungen
            const ro = new ResizeObserver(updateHScroll);
            ro.observe(table);
            ro.observe(wrapper);
            window.addEventListener('load', updateHScroll);
            window.addEventListener('resize', updateHScroll);
            // ein späterer Fix nach Bild- oder Font-Ladezeiten
            window.addEventListener('load', () => setTimeout(updateHScroll, 50));
        })();
    </script>
</body>
</html>
