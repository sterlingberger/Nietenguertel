<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nietengürtel.at</title>
    <link rel="icon" href="data/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="header-container" aria-hidden="false">
        <img src="data/snake_header_red.png" alt="Snake Header" class="header-img" />
    </div>
    <p>keine Cookies, kein Tracking, nur das Wesentliche</p>

    <div class="header-divider" aria-hidden="true"></div>

    <div class="filters" aria-hidden="false">
        <div class="filter-grid">
            <input type="checkbox" id="filter-u1" checked hidden>
            <img src="data/u1.svg" alt="U1" class="filter-icon" data-target="filter-u1" role="button" aria-pressed="true" />

            <input type="checkbox" id="filter-u2" checked hidden>
            <img src="data/u2.svg" alt="U2" class="filter-icon" data-target="filter-u2" role="button" aria-pressed="true" />

            <input type="checkbox" id="filter-u3" checked hidden>
            <img src="data/u3.svg" alt="U3" class="filter-icon" data-target="filter-u3" role="button" aria-pressed="true" />

            <input type="checkbox" id="filter-u6" checked hidden>
            <img src="data/u6.svg" alt="U6" class="filter-icon" data-target="filter-u6" role="button" aria-pressed="true" />
        </div>

        <span class="sep">|</span>

        <div class="row-filters" role="radiogroup" aria-label="Zeilenfilter">
            <button class="row-btn" data-filter="today" aria-checked="false" role="radio">heute</button>
            <button class="row-btn active" data-filter="week" aria-checked="true" role="radio">diese woche</button>
            <button class="row-btn" data-filter="all" aria-checked="false" role="radio">alle</button>
        </div>

        <span class="sep">|</span>
        <a class="participate-link" href="mitmachen.html">mitmachen</a>
    </div>

    <!-- Desktop: Tabelle -->
    <div class="table-wrapper">
        <table id="event-table">
            <thead>
                <tr id="header-row"></tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="5" style="color:#999; text-align:center;">Lade Daten...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="h-scroll" id="h-scroll" aria-hidden="true"><div class="inner" id="h-scroll-inner"></div></div>

    <!-- Mobile: Card-Liste -->
    <div class="card-list" id="card-list"></div>

    <div class="legal-links">
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
    </div>

    <script src="app.js"></script>
</body>
</html>
