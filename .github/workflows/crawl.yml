name: Daily Crawl

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: .NET Setup
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Build
        run: dotnet build EventCrawler.csproj

      - name: Install Playwright Browsers
        run: pwsh bin/Debug/net10.0/playwright.ps1 install chromium

      - name: Run Crawler
        run: dotnet run --project EventCrawler.csproj --no-build

      - name: Commit & Push events.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/events.json
          git commit -m "Update events.json $(Get-Date -Format 'yyyy-MM-dd')"
          git push
        shell: pwsh